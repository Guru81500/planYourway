<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plan My Way - Itinerary</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Plan My Way</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="itinerary.html">Itinerary</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <h2>Plan Your Itinerary</h2>

    <section class="trip-summary" aria-label="Trip summary">
      <div class="summary-card">
        <strong id="total-days">0</strong>
        <span>Days</span>
      </div>
      <div class="summary-card">
        <strong id="total-destinations">0</strong>
        <span>Destinations</span>
      </div>
      <div class="summary-card">
        <strong id="total-activities">0</strong>
        <span>Activities</span>
      </div>
      <div class="summary-card">
        <strong id="total-items">0</strong>
        <span>Total Items</span>
      </div>
    </section>

    <p id="save-status" class="save-status" aria-live="polite">Ready to plan</p>
    
    <div class="itinerary-controls">
      <button onclick="addDay()">➕ Add Day</button>
      <button onclick="saveItinerary()">💾 Save Itinerary</button>
      <button onclick="loadItinerary()">📂 Load Itinerary</button>
      <button onclick="clearAll()">🗑️ Clear All</button>
    </div>

    <div id="empty-state" class="empty-state">
      <h3>Start your travel plan</h3>
      <p>Add your first day, then fill it with destinations, activities, and notes.</p>
      <button onclick="addDay()">➕ Add First Day</button>
    </div>
    
    <div id="itinerary-container"></div>

    <div class="itinerary-actions">
      <button id="view-btn" onclick="viewItinerary()">👁️ View Itinerary</button>
      <button id="share-btn" onclick="shareItinerary()">📤 Share Itinerary</button>
    </div>
    
    <div id="itinerary-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="itinerary-modal-title">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="itinerary-modal-title">🌍 Your Travel Itinerary</h2>
          <button class="close-button" onclick="closeItineraryView()" aria-label="Close itinerary preview">✕</button>
        </div>
        <div id="itinerary-preview-content"></div>
        <div class="modal-actions">
          <button onclick="shareItinerary()">📤 Share</button>
          <button onclick="printItinerary()">🖨️ Print</button>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Plan My Way. All rights reserved.</p>
  </footer>

  <script>
    let dayCount = 0;
    let isLoading = false;

    window.addEventListener('load', function() {
      loadItinerary();
    });

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"]/g, function(character) {
        return {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;'
        }[character];
      });
    }

    function showSaveStatus(message) {
      const status = document.getElementById('save-status');
      status.textContent = message;
    }

    function formatDayDate(value) {
      if (!value) return '';
      const date = new Date(value + 'T00:00:00');
      return date.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
    }

    function updatePlannerState() {
      const totalDays = document.querySelectorAll('.day-box').length;
      const totalDestinations = document.querySelectorAll('.destination').length;
      const totalActivities = document.querySelectorAll('.activity').length;
      const totalItems = totalDestinations + totalActivities;

      document.getElementById('total-days').textContent = totalDays;
      document.getElementById('total-destinations').textContent = totalDestinations;
      document.getElementById('total-activities').textContent = totalActivities;
      document.getElementById('total-items').textContent = totalItems;
      document.getElementById('empty-state').style.display = totalDays ? 'none' : 'block';
    }

    function addDay(dayData) {
      dayCount++;
      const container = document.getElementById("itinerary-container");

      const dayBox = document.createElement("div");
      dayBox.classList.add("day-box");
      dayBox.setAttribute("id", `day-${dayCount}`);

      dayBox.innerHTML = `
        <div class="day-header">
          <h3>Day ${dayCount}</h3>
          <button class="danger-button" onclick="removeDay(${dayCount})">❌ Remove Day</button>
        </div>
        <div class="day-details-grid">
          <div>
            <label for="day-${dayCount}-date">Date:</label>
            <input id="day-${dayCount}-date" type="date" oninput="saveItinerary()">
          </div>
        </div>
        <label for="day-${dayCount}-notes">Notes for the Day:</label>
        <textarea id="day-${dayCount}-notes" placeholder="General notes for this day..." oninput="saveItinerary()"></textarea>
        
        <div class="buttons">
          <button type="button" onclick="addDestination(${dayCount})">📍 Add Destination</button>
          <button type="button" onclick="addActivity(${dayCount})">🎯 Add Activity</button>
        </div>
        
        <div class="items" id="items-day-${dayCount}"></div>
      `;

      container.appendChild(dayBox);
      if (dayData) {
        dayBox.querySelector("input[type='date']").value = dayData.date || '';
        dayBox.querySelector('textarea').value = dayData.notes || '';
        (dayData.items || []).forEach(function(itemData) {
          addItineraryItem(dayCount, itemData.type, itemData);
        });
      }
      updatePlannerState();

      if (!isLoading) {
        saveItinerary();
      }
    }

    function removeDay(dayId) {
      if (confirm('Are you sure you want to remove this day?')) {
        const dayElement = document.getElementById(`day-${dayId}`);
        dayElement.remove();
        saveItinerary();
      }
    }

    function addDestination(dayId) {
      addItineraryItem(dayId, 'destination');
    }

    function addActivity(dayId) {
      addItineraryItem(dayId, 'activity');
    }

    function addItineraryItem(dayId, type, itemData) {
      const itemsContainer = document.getElementById(`items-day-${dayId}`);
      const item = document.createElement("div");
      const isDestination = type === 'destination';
      const itemId = `${type}-${dayId}-${Date.now()}`;
      item.classList.add(type);

      item.innerHTML = `
        <div class="item-header">
          <h4>${isDestination ? '📍 Destination' : '🎯 Activity'}</h4>
          <button class="danger-button small-button" onclick="removeItem(this)" aria-label="Remove ${isDestination ? 'destination' : 'activity'}">✕</button>
        </div>
        <label class="visually-hidden" for="${itemId}-name">${isDestination ? 'Destination name' : 'Activity name'}</label>
        <input id="${itemId}-name" type="text" placeholder="${isDestination ? 'Destination name' : 'Activity name'}" oninput="saveItinerary()">
        <label class="visually-hidden" for="${itemId}-time">${isDestination ? 'Destination time' : 'Activity time'}</label>
        <input id="${itemId}-time" type="time" oninput="saveItinerary()">
        <label class="visually-hidden" for="${itemId}-notes">Notes about this ${isDestination ? 'destination' : 'activity'}</label>
        <textarea id="${itemId}-notes" placeholder="Notes about this ${isDestination ? 'destination' : 'activity'}..." oninput="saveItinerary()"></textarea>
      `;

      itemsContainer.appendChild(item);

      if (itemData) {
        item.querySelector("input[type='text']").value = itemData.name || '';
        item.querySelector("input[type='time']").value = itemData.time || '';
        item.querySelector('textarea').value = itemData.notes || '';
      }

      if (!isLoading) {
        saveItinerary();
      }
    }

    function removeItem(button) {
      if (confirm('Are you sure you want to remove this item?')) {
        button.closest('.destination, .activity').remove();
        saveItinerary();
      }
    }

    function saveItinerary() {
      const itineraryData = {
        dayCount: dayCount,
        days: []
      };

      const days = document.querySelectorAll(".day-box");
      days.forEach((day) => {
        const dayData = {
          id: day.id,
          date: day.querySelector("input[type='date']").value,
          notes: day.querySelector("textarea").value,
          items: []
        };

        const items = day.querySelectorAll(".items > div");
        items.forEach((item) => {
          const itemData = {
            type: item.classList.contains("destination") ? "destination" : "activity",
            name: item.querySelector("input[type='text']").value,
            time: item.querySelector("input[type='time']").value,
            notes: item.querySelector("textarea").value
          };
          dayData.items.push(itemData);
        });

        itineraryData.days.push(dayData);
      });

      localStorage.setItem('travelItinerary', JSON.stringify(itineraryData));
      updatePlannerState();

      if (!isLoading) {
        showSaveStatus('Saved just now');
      }
    }

    function loadItinerary() {
      const savedItinerary = localStorage.getItem('travelItinerary');
      isLoading = true;
      document.getElementById("itinerary-container").innerHTML = '';
      dayCount = 0;

      if (savedItinerary) {
        const itineraryData = JSON.parse(savedItinerary);

        (itineraryData.days || []).forEach(function(dayData) {
          addDay(dayData);
        });
        showSaveStatus('Loaded saved itinerary');
      } else {
        showSaveStatus('Ready to plan');
      }

      isLoading = false;
      updatePlannerState();
    }

    function clearAll() {
      if (confirm('Are you sure you want to clear your entire itinerary? This cannot be undone.')) {
        localStorage.removeItem('travelItinerary');
        document.getElementById("itinerary-container").innerHTML = '';
        dayCount = 0;
        updatePlannerState();
        showSaveStatus('Itinerary cleared');
      }
    }

    function shareItinerary() {
      const days = document.querySelectorAll(".day-box");

      if (days.length === 0) {
        alert("Your itinerary is empty! Add some days and destinations first.");
        return;
      }

      const itineraryTitle = 'My Travel Itinerary';
      let itineraryText = `🌍 ${itineraryTitle}\n\n`;

      days.forEach((day, index) => {
        const dayDate = formatDayDate(day.querySelector("input[type='date']").value);
        itineraryText += `📅 Day ${index + 1}${dayDate ? ` - ${dayDate}` : ''}:\n`;

        const notes = day.querySelector("textarea").value;
        if (notes) itineraryText += `📝 Notes: ${notes}\n`;

        const items = day.querySelectorAll(".items > div");
        items.forEach((item) => {
          const title = item.querySelector("input[type='text']").value;
          const time = item.querySelector("input[type='time']").value;
          const note = item.querySelector("textarea").value;
          const icon = item.classList.contains("destination") ? "📍" : "🎯";
          
          itineraryText += `${icon} ${title || (item.classList.contains("destination") ? "Destination" : "Activity")}`;
          if (time) itineraryText += ` at ${time}`;
          if (note) itineraryText += ` (${note})`;
          itineraryText += `\n`;
        });

        if (items.length === 0) {
          itineraryText += "No plans added yet.\n";
        }

        itineraryText += "\n";
      });

      itineraryText += "Created with Plan My Way 🚀";

      if (navigator.share) {
        navigator.share({
          title: itineraryTitle,
          text: itineraryText
        }).catch(err => console.log("Share canceled:", err));
      } else {
        const textArea = document.createElement('textarea');
        textArea.value = itineraryText;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          alert("Itinerary copied to clipboard!");
        } catch (err) {
          alert("Sharing is not supported in this browser.\n\n" + itineraryText);
        }
        document.body.removeChild(textArea);
      }
    }

    function viewItinerary() {
      const days = document.querySelectorAll(".day-box");
      
      if (days.length === 0) {
        alert("Your itinerary is empty! Add some days and destinations first.");
        return;
      }

      const totalDays = days.length;
      const totalItems = document.querySelectorAll(".destination, .activity").length;
      const totalDestinations = document.querySelectorAll(".destination").length;
      const totalActivities = document.querySelectorAll(".activity").length;
      let htmlContent = `
        <section class="preview-summary">
          <div><strong>${totalDays}</strong><br>Days</div>
          <div><strong>${totalDestinations}</strong><br>Destinations</div>
          <div><strong>${totalActivities}</strong><br>Activities</div>
          <div><strong>${totalItems}</strong><br>Total Items</div>
        </section>`;
      
      days.forEach((day, index) => {
        const dayNumber = index + 1;
        const dayDate = formatDayDate(day.querySelector("input[type='date']").value);
        htmlContent += `
          <div class="preview-day">
            <h3>
              <span>${dayNumber}</span>
              Day ${dayNumber}
            </h3>
            ${dayDate ? `<p class="preview-day-date">📅 ${escapeHtml(dayDate)}</p>` : ''}`;

        const notes = day.querySelector("textarea").value;
        if (notes) {
          htmlContent += `<div class="preview-note">
            <strong>📝 Day Notes:</strong> ${escapeHtml(notes)}
          </div>`;
        }

        const items = day.querySelectorAll(".items > div");
        if (items.length > 0) {
          items.forEach((item) => {
            const title = item.querySelector("input[type='text']").value;
            const time = item.querySelector("input[type='time']").value;
            const note = item.querySelector("textarea").value;
            const isDestination = item.classList.contains("destination");
            const icon = isDestination ? "📍" : "🎯";
            const itemClass = isDestination ? 'preview-destination' : 'preview-activity';
            
            htmlContent += `
              <div class="preview-item ${itemClass}">
                <div class="preview-item-header">
                  <strong>${icon} ${escapeHtml(title || (isDestination ? "Destination" : "Activity"))}</strong>
                  ${time ? `<span>🕒 ${escapeHtml(time)}</span>` : ''}
                </div>
                ${note ? `<p>${escapeHtml(note)}</p>` : ''}
              </div>`;
          });
        } else {
          htmlContent += `<p class="preview-empty">No activities or destinations added for this day.</p>`;
        }
        
        htmlContent += `</div>`;
      });

      document.getElementById('itinerary-preview-content').innerHTML = htmlContent;
      document.getElementById('itinerary-modal').style.display = 'block';
      document.body.style.overflow = 'hidden';
    }

    function closeItineraryView() {
      document.getElementById('itinerary-modal').style.display = 'none';
      document.body.style.overflow = 'auto';
    }

    function printItinerary() {
      const printContent = document.getElementById('itinerary-preview-content').innerHTML;
      const printWindow = window.open('', '_blank');
      const itineraryTitle = 'My Travel Itinerary';
      printWindow.document.write(`
        <html>
          <head>
            <title>${itineraryTitle}</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 20px; }
              h2 { color: #2e7d32; text-align: center; margin-bottom: 30px; }
              h3 { color: #2e7d32; }
              .preview-day { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 18px; }
              .preview-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 14px; }
              .preview-summary div { border: 1px solid #2e7d32; border-radius: 6px; padding: 10px; text-align: center; }
              .preview-day { border-left: 5px solid #2e7d32; }
              .preview-day h3 span { background: #2e7d32; color: white; border-radius: 50%; display: inline-flex; width: 28px; height: 28px; align-items: center; justify-content: center; margin-right: 8px; }
              .preview-day-date { color: #555; font-weight: 700; margin-top: -8px; }
              .preview-note { background: #fff3cd; border-left: 3px solid #ffc107; padding: 10px; margin-bottom: 12px; }
              .preview-item { border-left: 3px solid #0b5cad; background: #f8f9fa; padding: 12px; margin-bottom: 10px; }
              .preview-destination { border-left-color: #8a4b00; }
              .preview-item-header { display: flex; justify-content: space-between; gap: 10px; }
              .preview-item p, .preview-empty { color: #666; font-style: italic; }
              .no-print { display: none; }
              @media print {
                body { margin: 0; }
                .no-print { display: none !important; }
              }
            </style>
          </head>
          <body>
            <h2>🌍 ${itineraryTitle}</h2>
            ${printContent}
            <div style="text-align: center; margin-top: 30px; color: #666; font-size: 12px;">
              Generated by Plan My Way on ${new Date().toLocaleDateString()}
            </div>
          </body>
        </html>
      `);
      printWindow.document.close();
      printWindow.print();
    }

    // Close modal when clicking outside
    document.addEventListener('click', function(event) {
      const modal = document.getElementById('itinerary-modal');
      if (event.target === modal) {
        closeItineraryView();
      }
    });

    // Close modal with Escape key
    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') {
        closeItineraryView();
      }
    });
  </script>

</body>
</html>
