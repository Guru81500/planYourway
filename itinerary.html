<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plan My Way - Itinerary</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .day-box {
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 15px;
      margin-bottom: 20px;
    }
    .day-box h3 {
      color: #4caf50;
    }
    .activity, .destination {
      margin-top: 10px;
      padding: 10px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .day-box input, 
    .day-box textarea {
      width: 100%;
      margin-top: 6px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .buttons {
      margin-top: 10px;
    }
    .buttons button {
      background: #4caf50;
      color: white;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 10px;
    }
    .buttons button:hover {
      background: #45a049;
    }
    #share-btn {
      display: block;
      margin: 30px auto;
      background: #2196f3;
    }
    #share-btn:hover {
      background: #0b7dda;
    }
  </style>
</head>
<body>

  <header>
    <h1>Plan My Way</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="itinerary.html">Itinerary</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <h2>Plan Your Itinerary</h2>
    
    <div class="itinerary-controls">
      <button onclick="addDay()">➕ Add Day</button>
      <button onclick="saveItinerary()">💾 Save Itinerary</button>
      <button onclick="loadItinerary()">📂 Load Itinerary</button>
      <button onclick="clearAll()">🗑️ Clear All</button>
    </div>
    
    <div id="itinerary-container"></div>

    <!-- Action buttons -->
    <div style="text-align: center; margin-top: 30px;">
      <button id="view-btn" onclick="viewItinerary()" style="background: #9c27b0; margin-right: 15px;">👁️ View Itinerary</button>
      <button id="share-btn" onclick="shareItinerary()">📤 Share Itinerary</button>
    </div>
    
    <!-- Itinerary Preview Modal -->
    <div id="itinerary-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
      <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 15px; max-width: 800px; max-height: 80vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #e0e0e0; padding-bottom: 15px;">
          <h2 style="color: #9c27b0; margin: 0;">🌍 Your Travel Itinerary</h2>
          <button onclick="closeItineraryView()" style="background: #f44336; color: white; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-size: 18px;">✕</button>
        </div>
        <div id="itinerary-preview-content"></div>
        <div style="text-align: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid #e0e0e0;">
          <button onclick="shareItinerary()" style="background: #2196f3; margin-right: 10px;">📤 Share</button>
          <button onclick="printItinerary()" style="background: #4caf50;">🖨️ Print</button>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Plan My Way. All rights reserved.</p>
  </footer>

  <script>
    let dayCount = 0;

    // Load itinerary on page load
    window.addEventListener('load', function() {
      loadItinerary();
    });

    function addDay() {
      dayCount++;
      const container = document.getElementById("itinerary-container");

      const dayBox = document.createElement("div");
      dayBox.classList.add("day-box");
      dayBox.setAttribute("id", `day-${dayCount}`);

      dayBox.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h3>Day ${dayCount}</h3>
          <button onclick="removeDay(${dayCount})" style="background: #f44336; font-size: 14px; padding: 5px 10px;">❌ Remove Day</button>
        </div>
        <label>Notes for the Day:</label>
        <textarea placeholder="General notes for this day..." onchange="saveItinerary()"></textarea>
        
        <div class="buttons">
          <button type="button" onclick="addDestination(${dayCount})">📍 Add Destination</button>
          <button type="button" onclick="addActivity(${dayCount})">🎯 Add Activity</button>
        </div>
        
        <div class="items" id="items-day-${dayCount}"></div>
      `;

      container.appendChild(dayBox);
      saveItinerary();
    }

    function removeDay(dayId) {
      if (confirm('Are you sure you want to remove this day?')) {
        const dayElement = document.getElementById(`day-${dayId}`);
        dayElement.remove();
        saveItinerary();
      }
    }

    function addDestination(dayId) {
      const itemsContainer = document.getElementById(`items-day-${dayId}`);
      const destination = document.createElement("div");
      destination.classList.add("destination");
      const itemId = Date.now();

      destination.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h4>📍 Destination</h4>
          <button onclick="removeItem(this)" style="background: #f44336; font-size: 12px; padding: 3px 8px;">✕</button>
        </div>
        <input type="text" placeholder="Destination name" onchange="saveItinerary()">
        <input type="time" onchange="saveItinerary()">
        <textarea placeholder="Notes about this destination..." onchange="saveItinerary()"></textarea>
      `;

      itemsContainer.appendChild(destination);
      saveItinerary();
    }

    function addActivity(dayId) {
      const itemsContainer = document.getElementById(`items-day-${dayId}`);
      const activity = document.createElement("div");
      activity.classList.add("activity");

      activity.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h4>🎯 Activity</h4>
          <button onclick="removeItem(this)" style="background: #f44336; font-size: 12px; padding: 3px 8px;">✕</button>
        </div>
        <input type="text" placeholder="Activity name" onchange="saveItinerary()">
        <input type="time" onchange="saveItinerary()">
        <textarea placeholder="Notes about this activity..." onchange="saveItinerary()"></textarea>
      `;

      itemsContainer.appendChild(activity);
      saveItinerary();
    }

    function removeItem(button) {
      if (confirm('Are you sure you want to remove this item?')) {
        button.closest('.destination, .activity').remove();
        saveItinerary();
      }
    }

    function saveItinerary() {
      const itineraryData = {
        dayCount: dayCount,
        days: []
      };

      const days = document.querySelectorAll(".day-box");
      days.forEach((day) => {
        const dayData = {
          id: day.id,
          notes: day.querySelector("textarea").value,
          items: []
        };

        const items = day.querySelectorAll(".items > div");
        items.forEach((item) => {
          const itemData = {
            type: item.classList.contains("destination") ? "destination" : "activity",
            name: item.querySelector("input[type='text']").value,
            time: item.querySelector("input[type='time']").value,
            notes: item.querySelector("textarea").value
          };
          dayData.items.push(itemData);
        });

        itineraryData.days.push(dayData);
      });

      localStorage.setItem('travelItinerary', JSON.stringify(itineraryData));
    }

    function loadItinerary() {
      const savedItinerary = localStorage.getItem('travelItinerary');
      if (savedItinerary) {
        const itineraryData = JSON.parse(savedItinerary);
        dayCount = itineraryData.dayCount || 0;

        // Clear current itinerary
        document.getElementById("itinerary-container").innerHTML = '';

        // Rebuild itinerary
        itineraryData.days.forEach((dayData, index) => {
          addDay();
          const currentDay = document.getElementById(dayData.id);
          if (currentDay) {
            currentDay.querySelector("textarea").value = dayData.notes || '';

            dayData.items.forEach((itemData) => {
              if (itemData.type === "destination") {
                addDestination(index + 1);
              } else {
                addActivity(index + 1);
              }

              const items = currentDay.querySelectorAll(".items > div");
              const lastItem = items[items.length - 1];
              if (lastItem) {
                lastItem.querySelector("input[type='text']").value = itemData.name || '';
                lastItem.querySelector("input[type='time']").value = itemData.time || '';
                lastItem.querySelector("textarea").value = itemData.notes || '';
              }
            });
          }
        });
      }
    }

    function clearAll() {
      if (confirm('Are you sure you want to clear your entire itinerary? This cannot be undone.')) {
        localStorage.removeItem('travelItinerary');
        document.getElementById("itinerary-container").innerHTML = '';
        dayCount = 0;
      }
    }

    function shareItinerary() {
      let itineraryText = "🌍 My Travel Itinerary:\n\n";
      const days = document.querySelectorAll(".day-box");

      if (days.length === 0) {
        alert("Your itinerary is empty! Add some days and destinations first.");
        return;
      }

      days.forEach((day, index) => {
        itineraryText += `📅 Day ${index + 1}:\n`;

        const notes = day.querySelector("textarea").value;
        if (notes) itineraryText += `📝 Notes: ${notes}\n`;

        const items = day.querySelectorAll(".items > div");
        items.forEach((item) => {
          const title = item.querySelector("input[type='text']").value;
          const time = item.querySelector("input[type='time']").value;
          const note = item.querySelector("textarea").value;
          const icon = item.classList.contains("destination") ? "📍" : "🎯";
          
          itineraryText += `${icon} ${title || (item.classList.contains("destination") ? "Destination" : "Activity")}`;
          if (time) itineraryText += ` at ${time}`;
          if (note) itineraryText += ` (${note})`;
          itineraryText += `\n`;
        });

        itineraryText += "\n";
      });

      itineraryText += "Created with Plan My Way 🚀";

      if (navigator.share) {
        navigator.share({
          title: "My Travel Itinerary",
          text: itineraryText
        }).catch(err => console.log("Share canceled:", err));
      } else {
        // Create a text area and copy to clipboard
        const textArea = document.createElement('textarea');
        textArea.value = itineraryText;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          alert("Itinerary copied to clipboard!");
        } catch (err) {
          alert("Sharing is not supported in this browser.\n\n" + itineraryText);
        }
        document.body.removeChild(textArea);
      }
    }

    function viewItinerary() {
      const days = document.querySelectorAll(".day-box");
      
      if (days.length === 0) {
        alert("Your itinerary is empty! Add some days and destinations first.");
        return;
      }

      let htmlContent = '';
      
      days.forEach((day, index) => {
        const dayNumber = index + 1;
        htmlContent += `
          <div style="margin-bottom: 25px; padding: 20px; background: #f8f9fa; border-radius: 10px; border-left: 5px solid #4caf50;">
            <h3 style="color: #4caf50; margin-bottom: 15px; display: flex; align-items: center;">
              <span style="background: #4caf50; color: white; border-radius: 50%; width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; margin-right: 10px; font-size: 14px;">${dayNumber}</span>
              Day ${dayNumber}
            </h3>`;

        const notes = day.querySelector("textarea").value;
        if (notes) {
          htmlContent += `<div style="background: #fff3cd; padding: 10px; border-radius: 5px; margin-bottom: 15px; border-left: 3px solid #ffc107;">
            <strong>📝 Day Notes:</strong> ${notes}
          </div>`;
        }

        const items = day.querySelectorAll(".items > div");
        if (items.length > 0) {
          items.forEach((item) => {
            const title = item.querySelector("input[type='text']").value;
            const time = item.querySelector("input[type='time']").value;
            const note = item.querySelector("textarea").value;
            const isDestination = item.classList.contains("destination");
            const icon = isDestination ? "📍" : "🎯";
            const bgColor = isDestination ? "#fff8e1" : "#e3f2fd";
            const borderColor = isDestination ? "#ff9800" : "#2196f3";
            
            htmlContent += `
              <div style="background: ${bgColor}; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid ${borderColor};">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
                  <strong style="color: #333; font-size: 16px;">${icon} ${title || (isDestination ? "Destination" : "Activity")}</strong>
                  ${time ? `<span style="background: white; padding: 4px 8px; border-radius: 15px; font-size: 14px; color: #666;">🕒 ${time}</span>` : ''}
                </div>
                ${note ? `<p style="color: #666; margin: 0; font-style: italic;">${note}</p>` : ''}
              </div>`;
          });
        } else {
          htmlContent += `<p style="color: #999; font-style: italic;">No activities or destinations added for this day.</p>`;
        }
        
        htmlContent += `</div>`;
      });

      // Add summary at the end
      const totalDays = days.length;
      const totalItems = document.querySelectorAll(".destination, .activity").length;
      const totalDestinations = document.querySelectorAll(".destination").length;
      const totalActivities = document.querySelectorAll(".activity").length;

      htmlContent += `
        <div style="background: linear-gradient(135deg, #4caf50, #45a049); color: white; padding: 20px; border-radius: 10px; text-align: center; margin-top: 20px;">
          <h3 style="margin-bottom: 15px; color: white;">📊 Trip Summary</h3>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px;">
            <div><strong>${totalDays}</strong><br>Days</div>
            <div><strong>${totalDestinations}</strong><br>Destinations</div>
            <div><strong>${totalActivities}</strong><br>Activities</div>
            <div><strong>${totalItems}</strong><br>Total Items</div>
          </div>
        </div>`;

      document.getElementById('itinerary-preview-content').innerHTML = htmlContent;
      document.getElementById('itinerary-modal').style.display = 'block';
      document.body.style.overflow = 'hidden'; // Prevent background scrolling
    }

    function closeItineraryView() {
      document.getElementById('itinerary-modal').style.display = 'none';
      document.body.style.overflow = 'auto'; // Restore scrolling
    }

    function printItinerary() {
      const printContent = document.getElementById('itinerary-preview-content').innerHTML;
      const printWindow = window.open('', '_blank');
      printWindow.document.write(`
        <html>
          <head>
            <title>My Travel Itinerary</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 20px; }
              h2 { color: #4caf50; text-align: center; margin-bottom: 30px; }
              h3 { color: #4caf50; }
              .no-print { display: none; }
              @media print {
                body { margin: 0; }
                .no-print { display: none !important; }
              }
            </style>
          </head>
          <body>
            <h2>🌍 My Travel Itinerary</h2>
            ${printContent}
            <div style="text-align: center; margin-top: 30px; color: #666; font-size: 12px;">
              Generated by Plan My Way on ${new Date().toLocaleDateString()}
            </div>
          </body>
        </html>
      `);
      printWindow.document.close();
      printWindow.print();
    }

    // Close modal when clicking outside
    document.addEventListener('click', function(event) {
      const modal = document.getElementById('itinerary-modal');
      if (event.target === modal) {
        closeItineraryView();
      }
    });

    // Close modal with Escape key
    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') {
        closeItineraryView();
      }
    });
  </script>

</body>
</html>
